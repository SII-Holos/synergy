name: Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Release target"
        required: true
        type: choice
        options:
          - product
          - packages
        default: product
      bump:
        description: "Stable version bump"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      packages:
        description: "Package-only aliases: plugin-kit, plugin, sdk, meta-protocol"
        required: false
        type: string
        default: ""
      tag:
        description: "npm dist-tag for package-only releases"
        required: false
        type: string
        default: latest

jobs:
  stable_candidate:
    name: Publish Stable Candidate
    if: ${{ inputs.target == 'product' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.publish.outputs.version }}
      state_path: ${{ steps.publish.outputs.state_path }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: bun install

      - name: Publish npm candidate and draft assets
        id: publish
        run: bun run ./script/release/stable-start.ts
        env:
          SYNERGY_BUMP: ${{ inputs.bump }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release state
        uses: actions/upload-artifact@v4
        with:
          name: release-state-${{ steps.publish.outputs.version }}
          path: ${{ steps.publish.outputs.state_path }}

  stable_desktop_package:
    name: Build Desktop Artifacts (${{ matrix.platform }})
    needs: [stable_candidate]
    if: ${{ inputs.target == 'product' && needs.stable_candidate.result == 'success' }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            runtime_targets: darwin-x64,darwin-arm64
            builder_args: --mac dmg zip --x64 --arm64
          - os: windows-latest
            platform: win32
            runtime_targets: win32-x64,win32-arm64
            builder_args: --win nsis zip --x64 --arm64
          - os: ubuntu-latest
            platform: linux
            runtime_targets: linux-x64,linux-arm64
            builder_args: --linux AppImage deb tar.gz --x64 --arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install Linux packaging dependencies
        if: ${{ matrix.platform == 'linux' }}
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: bun install

      - name: Prepare release version
        run: bun run ./script/release/desktop-prepare-version.ts
        env:
          SYNERGY_VERSION: ${{ needs.stable_candidate.outputs.version }}

      - name: Build Synergy runtime for desktop package
        run: bun run ./packages/synergy/script/build.ts
        env:
          SYNERGY_VERSION: ${{ needs.stable_candidate.outputs.version }}
          SYNERGY_CHANNEL: stable
          SYNERGY_BUILD_TARGETS: ${{ matrix.runtime_targets }}
          SYNERGY_REUSE_PUBLISHED_RUNTIME: ${{ matrix.platform == 'win32' && '1' || '' }}

      - name: Build desktop main process
        run: bun run --cwd packages/desktop desktop:build

      - name: Package desktop artifact
        shell: bash
        run: |
          BUILDER_ARGS=(${{ matrix.builder_args }})
          if [ -z "${CSC_LINK:-}" ]; then
            unset CSC_LINK
            unset CSC_KEY_PASSWORD
            if [ "${{ matrix.platform }}" = "darwin" ]; then
              BUILDER_ARGS+=(--config.mac.identity=null)
            fi
          fi
          if [ -z "${APPLE_ID:-}" ]; then
            unset APPLE_ID
            unset APPLE_APP_SPECIFIC_PASSWORD
            unset APPLE_TEAM_ID
          fi
          cd packages/desktop
          bunx electron-builder "${BUILDER_ARGS[@]}" --publish=never
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ matrix.platform == 'win32' && secrets.WINDOWS_CERTIFICATE || secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'win32' && secrets.WINDOWS_CERTIFICATE_PASSWORD || secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload desktop artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: desktop-artifacts-${{ matrix.platform }}
          path: |
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.blockmap
            packages/desktop/release/*.deb
            packages/desktop/release/*.dmg
            packages/desktop/release/*.exe
            packages/desktop/release/*.tar.gz
            packages/desktop/release/*.yml
            packages/desktop/release/*.zip

  stable_desktop_publish:
    name: Upload Desktop Artifacts
    needs: [stable_candidate, stable_desktop_package]
    if: ${{ inputs.target == 'product' && needs.stable_candidate.result == 'success' && needs.stable_desktop_package.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ needs.stable_candidate.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: desktop-release-input
          pattern: desktop-artifacts-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          mkdir -p desktop-release
          find desktop-release-input -maxdepth 2 -type f -exec cp {} desktop-release/ \;
          SYNERGY_VERSION="${RELEASE_VERSION}" bun run --cwd packages/desktop script/checksums.ts "${GITHUB_WORKSPACE}/desktop-release"

      - name: Upload desktop assets to draft release
        shell: bash
        run: gh release upload "v${RELEASE_VERSION}" desktop-release/* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  stable_finalize:
    name: Finalize Stable Release
    needs: [stable_candidate, stable_desktop_publish]
    if: ${{ inputs.target == 'product' && always() && needs.stable_candidate.result == 'success' && needs.stable_desktop_publish.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      RELEASE_VERSION: ${{ needs.stable_candidate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install

      - name: Download release state
        uses: actions/download-artifact@v4
        with:
          name: release-state-${{ env.RELEASE_VERSION }}
          path: .release

      - name: Promote latest and finalize GitHub release
        run: bun run ./script/release/stable-complete.ts
        env:
          SYNERGY_VERSION: ${{ env.RELEASE_VERSION }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync main branch with dev
        run: |
          REPO="${{ github.repository }}"
          gh pr create \
            --base main \
            --head dev \
            --title "chore: sync main with dev (v${{ env.RELEASE_VERSION }})" \
            --body "Automated sync from dev after release v${{ env.RELEASE_VERSION }}." \
            --repo "$REPO" || true
          PR_NUMBER=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number' --repo "$REPO")
          if [ -n "$PR_NUMBER" ]; then
            gh pr merge "$PR_NUMBER" --merge --admin --delete-branch=false --repo "$REPO"
          fi
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}

  package_release:
    name: Publish Package-Only Release
    if: ${{ inputs.target == 'packages' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: bun install

      - name: Publish selected packages
        run: bun run ./script/release/package-only.ts
        env:
          SYNERGY_BUMP: ${{ inputs.bump }}
          SYNERGY_RELEASE_PACKAGES: ${{ inputs.packages }}
          SYNERGY_NPM_TAG: ${{ inputs.tag }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
