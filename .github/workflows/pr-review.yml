name: PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    name: AI Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Synergy
        run: curl -fsSL https://raw.githubusercontent.com/SII-Holos/synergy/main/install | bash -s -- --no-modify-path
        env:
          VERSION: ${{ vars.SYNERGY_VERSION || '' }}

      - name: Configure Synergy
        run: |
          mkdir -p ~/.synergy/config
          cat > ~/.synergy/config/synergy.jsonc << 'CONFIG'
          {
            "model": "sii-openai/GPT-5.4",
            "nano_model": "sii-openai/GPT-4.1 nano",
            "mini_model": "sii-openai/GPT-4.1 mini",
            "mid_model": "sii-openai/GPT-5.4",
            "thinking_model": "sii-openai/GPT-5.4",
            "long_context_model": "sii-openai/GPT-5.4",
            "creative_model": "sii-openai/GPT-5.4",
            "provider": {
              "sii-openai": {
                "api": "https://apicz.boyuerichdata.com/v1",
                "name": "sii-openai",
                "env": ["SII_API_KEY"],
                "npm": "@ai-sdk/openai-compatible",
                "models": {
                  "GPT-4.1 nano": {
                    "id": "gpt-4.1-nano",
                    "name": "GPT-4.1 nano",
                    "family": "Openai",
                    "modalities": { "input": ["text", "image"], "output": ["text"] },
                    "cost": { "input": 0.08, "output": 0.16 },
                    "limit": { "context": 1047576, "output": 32768 }
                  },
                  "GPT-4.1 mini": {
                    "id": "gpt-4.1-mini",
                    "name": "GPT-4.1 mini",
                    "family": "Openai",
                    "modalities": { "input": ["text", "image"], "output": ["text"] },
                    "cost": { "input": 0.32, "output": 0.64 },
                    "limit": { "context": 1047576, "output": 32768 }
                  },
                  "GPT-4.1": {
                    "id": "gpt-4.1",
                    "name": "GPT-4.1",
                    "family": "Openai",
                    "modalities": { "input": ["text", "image"], "output": ["text"] },
                    "cost": { "input": 1.6, "output": 3.21 },
                    "limit": { "context": 1047576, "output": 32768 }
                  },
                  "GPT-5.4": {
                    "id": "gpt-5.4",
                    "name": "GPT-5.4",
                    "family": "Openai",
                    "modalities": { "input": ["text", "image"], "output": ["text"] },
                    "cost": { "input": 2.0, "output": 12.02 },
                    "limit": { "context": 272000, "output": 128000 }
                  }
                },
                "options": {
                  "baseURL": "https://apicz.boyuerichdata.com/v1"
                }
              }
            }
          }
          CONFIG

      - name: Get PR diff
        run: |
          gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} > /tmp/pr.diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run AI Review
        run: |
          synergy send \
            --format json \
            --model "sii-openai/GPT-5.4" \
            --title "PR Review #${{ github.event.pull_request.number }}" \
            "Review this PR carefully.

          DIFF INTERPRETATION RULES (CRITICAL — read before reviewing):
          1. Lines starting with '-' (minus) are REMOVED code — they NO LONGER EXIST.
             NEVER flag a bug or issue in a removed line. That code is gone.
          2. Lines starting with '+' (plus) are ADDED code — this is current. Flag issues here.
          3. Lines with no prefix are context — they exist before AND after. Only flag if the
             diff changes make the existing code incorrect.
          4. If the diff REMOVES a buggy pattern and REPLACES it with a fix, do NOT flag the old
             bug as if it still exists. Only flag if the replacement is also wrong.
          5. Do NOT re-flag issues from previous reviews on this PR. Only report NEW findings.

          PR: ${{ github.event.pull_request.title }}
          ${{ github.event.pull_request.body || '' }}

          Evaluate each changed file. For every real issue found, output a block like:

          **[SEVERITY]** file/path:line — description

          Where SEVERITY is one of: 🔴 Critical, 🟡 Warning, 🔵 Suggestion.

          Categories to check:
          - 🔴 Bugs, logic errors, race conditions, incorrect algorithms
          - 🔴 Security: injection, auth bypass, secret leaks, unsafe deserialization
          - 🟡 Performance: N+1 queries, unnecessary re-renders, memory leaks, O(n²) where O(n) exists
          - 🟡 Error handling: swallowed errors, missing validation, unhandled edge cases
          - 🔵 Readability: confusing logic, misleading names, dead code
          - 🔵 Test coverage: critical paths without tests, missing edge case tests

          Skip: formatting, naming style preferences, adding comments/docs unless genuinely missing for understanding.

          End with a one-line verdict: either **LGTM** or **Needs Changes** with a brief reason." \
            --file /tmp/pr.diff 2>/dev/null \
            | jq -r 'select(.type=="text") | .part.text' \
            | sed '/^$/d' > /tmp/review.txt

          # Fallback: if json parsing produced nothing, re-run with default format
          if [ ! -s /tmp/review.txt ]; then
            synergy send \
              --model "sii-openai/GPT-5.4" \
              "Review this PR diff. Report bugs, security issues, performance problems, and missing error handling as 🔴/🟡/🔵 items with file:line. End with **LGTM** or **Needs Changes**. PR: ${{ github.event.pull_request.title }}" \
              --file /tmp/pr.diff > /tmp/review.txt 2>&1
          fi
        env:
          SII_API_KEY: ${{ secrets.SII_API_KEY }}

      - name: Determine review event
        id: event
        run: |
          if grep -qiE '^\*\*LGTM\*\*' /tmp/review.txt; then
            echo "event=approve" >> "$GITHUB_OUTPUT"
          else
            echo "event=comment" >> "$GITHUB_OUTPUT"
          fi

      - name: Submit Review
        run: |
          gh pr review ${{ github.event.pull_request.number }} \
            --${{ steps.event.outputs.event }} \
            --body-file /tmp/review.txt \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
