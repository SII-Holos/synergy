name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Check monorepo dependencies
        run: bun run monorepo:check

      - name: Check dead code and dependency hygiene
        run: bun run deadcode

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install

      - name: Install Playwright Chromium
        run: bunx playwright install chromium

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Configure git identity
        run: |
          git config --global user.email "ci@synergy.dev"
          git config --global user.name "CI Runner"

      - name: Run package tests
        run: bun turbo test
        env:
          SYNERGY_LINK_HOME: /tmp/synergy-link-ci-test

      - name: Run Synergy coverage
        run: bun test --coverage --timeout 30000 --coverage-reporter=lcov
        working-directory: packages/synergy
        env:
          SYNERGY_LINK_HOME: /tmp/synergy-link-ci-test

  package-validation:
    name: Package Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install

      - name: Validate publishable packages
        run: bun run package:check

  workflow-validation:
    name: Workflow Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
          ./actionlint -color

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Run zizmor
        run: uvx zizmor==1.26.1 .

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz -o gitleaks.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --source . --redact --config .gitleaks.toml --verbose --exit-code 1

  desktop:
    name: Desktop Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install

      - name: Install Linux smoke dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libarchive-tools \
            rpm \
            libgtk-3-0 \
            libnss3 \
            libxss1 \
            libxtst6 \
            libatspi2.0-0 \
            libgbm1 \
            libasound2t64

      - name: Desktop typecheck and unit tests
        run: bun run --cwd packages/desktop desktop:test

      - name: Desktop package config validation
        run: |
          bun run --cwd packages/desktop desktop:build
          cd packages/desktop
          SYNERGY_DESKTOP_ALLOW_MISSING_RUNTIME=1 bunx electron-builder --dir --publish=never

      - name: Desktop runtime smoke
        run: xvfb-run -a bun run --cwd packages/desktop test:runtime

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install

      - name: Start server and check health
        run: |
          bun run packages/synergy/src/index.ts server --port 4800 &
          SERVER_PID=$!

          # Wait for server to be ready (max 30 seconds)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4800/global/health > /dev/null 2>&1; then
              echo "Server is healthy after ${i}s"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "::error::Server process exited unexpectedly"
              exit 1
            fi
            sleep 1
          done

          # Verify health response
          HEALTH=$(curl -sf http://localhost:4800/global/health)
          echo "Health response: $HEALTH"

          if echo "$HEALTH" | grep -q '"healthy":true'; then
            echo "Smoke test passed"
          else
            echo "::error::Health check failed: $HEALTH"
            kill $SERVER_PID 2>/dev/null
            exit 1
          fi

          kill $SERVER_PID 2>/dev/null
