name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install

      - name: Configure git identity
        run: |
          git config --global user.email "ci@synergy.dev"
          git config --global user.name "CI Runner"

      - name: Run tests
        run: bun test --timeout 30000
        working-directory: packages/synergy

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install

      - name: Check formatting
        run: |
          ./script/format.ts
          git diff --exit-code || (echo "::error::Code is not formatted. Run ./script/format.ts locally and commit the changes." && exit 1)

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install

      - name: Start server and check health
        run: |
          bun run packages/synergy/src/index.ts server --port 4800 &
          SERVER_PID=$!

          # Wait for server to be ready (max 30 seconds)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4800/global/health > /dev/null 2>&1; then
              echo "Server is healthy after ${i}s"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "::error::Server process exited unexpectedly"
              exit 1
            fi
            sleep 1
          done

          # Verify health response
          HEALTH=$(curl -sf http://localhost:4800/global/health)
          echo "Health response: $HEALTH"

          if echo "$HEALTH" | grep -q '"healthy":true'; then
            echo "Smoke test passed"
          else
            echo "::error::Health check failed: $HEALTH"
            kill $SERVER_PID 2>/dev/null
            exit 1
          fi

          kill $SERVER_PID 2>/dev/null
