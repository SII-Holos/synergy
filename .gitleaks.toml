title = "Synergy gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Repository fixtures and explicit fake token markers."
paths = [
  '''packages/synergy/test/.*/fixtures/.*''',
  '''packages/synergy/test/tool/fixtures/.*'''
]
regexes = [
  '''example[_-]?(api|auth)?[_-]?key''',
  '''fake[_-]?(token|secret|key)''',
  '''dummy[_-]?(token|secret|key)''',
  '''placeholder[_-]?(token|secret|key)'''
]
stopwords = [
  "DUT9wguAFiMl6pkFL8gcHWrmnoc",
  "OGrmdkSyPoxLdrxLc9xceKH7nfd",
  "Ov23li8tweQw6odWQebz",
  "9d1c250a-e61b-44d9-88ed-5944d1962f5e"
]
