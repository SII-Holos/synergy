<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="body" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FFD6A5"/>
      <stop offset="60%" stop-color="#FFB86C"/>
      <stop offset="100%" stop-color="#F0943D"/>
    </radialGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB07C"/>
      <stop offset="100%" stop-color="#FF9F6B"/>
    </radialGradient>
  </defs>

  <!-- Face circle -->
  <circle cx="32" cy="31" r="26" fill="url(#body)" stroke="#FFD6A5" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Ears (small rounded bumps) -->
  <ellipse cx="12" cy="18" rx="6" ry="7" fill="url(#body)" transform="rotate(-15 12 18)"/>
  <ellipse cx="52" cy="18" rx="6" ry="7" fill="url(#body)" transform="rotate(15 52 18)"/>

  <!-- Inner ears -->
  <ellipse cx="12" cy="18" rx="3.5" ry="4.5" fill="#FF9F6B" fill-opacity="0.4" transform="rotate(-15 12 18)"/>
  <ellipse cx="52" cy="18" rx="3.5" ry="4.5" fill="#FF9F6B" fill-opacity="0.4" transform="rotate(15 52 18)"/>

  <!-- Cheeks -->
  <ellipse cx="20" cy="37" rx="6" ry="5" fill="url(#cheek)" fill-opacity="0.6"/>
  <ellipse cx="44" cy="37" rx="6" ry="5" fill="url(#cheek)" fill-opacity="0.6"/>

  <!-- Eyes -->
  <circle cx="23.5" cy="28" r="3.5" fill="#3D2E1E"/>
  <circle cx="40.5" cy="28" r="3.5" fill="#3D2E1E"/>

  <!-- Eye shine -->
  <circle cx="25" cy="26.5" r="1.3" fill="white" fill-opacity="0.9"/>
  <circle cx="42" cy="26.5" r="1.3" fill="white" fill-opacity="0.9"/>

  <!-- Nose (tiny triangle) -->
  <path d="M31 33 L33 33 L32 35.5 Z" fill="#3D2E1E" fill-opacity="0.6"/>

  <!-- Mouth (gentle smile) -->
  <path d="M28 38.5 Q32 41.5 36 38.5" fill="none" stroke="#3D2E1E" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.5"/>

  <!-- Tiny bow tie (subtle personality) -->
  <path d="M28 44 L32 42 L36 44 L32 43 Z" fill="#FF9F6B" fill-opacity="0.35"/>
  <circle cx="32" cy="43" r="1.5" fill="#FF9F6B" fill-opacity="0.35"/>
</svg>
