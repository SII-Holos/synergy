<!doctype html>
<html lang="en" style="overflow: hidden">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Synergy</title>
    <script id="synergy-head-assets-script">
      ;(function () {
        var route = window.__SYNERGY_ROUTE__
        var prefix = ""
        if (route != null) {
          var fullPath = window.location.pathname
          if (fullPath !== route && fullPath.endsWith(route)) {
            prefix = fullPath.slice(0, fullPath.length - route.length).replace(/\/+$/, "")
          }
        }
        function asset(path) {
          return prefix + path
        }
        function attr(value) {
          return String(value).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;")
        }
        function write(tag, attrs) {
          var html = "<" + tag
          for (var name in attrs) html += " " + name + '="' + attr(attrs[name]) + '"'
          document.write(html + ">")
        }
        window.__SYNERGY_ASSET_PREFIX__ = prefix
        write("link", { rel: "icon", type: "image/png", href: asset("/favicon-96x96.png"), sizes: "96x96" })
        write("link", { rel: "icon", type: "image/svg+xml", href: asset("/favicon.svg") })
        write("link", { rel: "shortcut icon", href: asset("/favicon.ico") })
        write("link", { rel: "apple-touch-icon", sizes: "180x180", href: asset("/apple-touch-icon.png") })
        write("link", { rel: "manifest", href: asset("/site.webmanifest") })
        write("meta", { property: "og:image", content: asset("/social-share.png") })
        write("meta", { property: "twitter:image", content: asset("/social-share.png") })
      })()
    </script>
    <meta name="theme-color" content="#F8F7F7" />
    <meta name="theme-color" content="#131010" media="(prefers-color-scheme: dark)" />
    <script id="synergy-theme-preload-script">
      ;(function () {
        var scheme = localStorage.getItem("synergy-color-scheme") || "system"
        var isDark = scheme === "dark" || (scheme === "system" && matchMedia("(prefers-color-scheme: dark)").matches)
        var mode = isDark ? "dark" : "light"
        document.documentElement.style.setProperty("color-scheme", mode)
      })()
    </script>
    <script id="synergy-app-boot-preload-script">
      ;(function () {
        var desktopWindow = window.synergyDesktop && window.synergyDesktop.window
        var chrome = desktopWindow && desktopWindow.chrome
        if (chrome === "custom" || chrome === "native") {
          document.documentElement.setAttribute("data-synergy-desktop-chrome", chrome)
        }
      })()
    </script>
    <style id="synergy-app-boot-style">
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f7f7f5;
      }

      #synergy-app-boot {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: #f7f7f5;
        color: #1c1d20;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .synergy-app-boot-chrome {
        display: none;
        user-select: none;
        -webkit-app-region: drag;
      }

      html[data-synergy-desktop-chrome="custom"] .synergy-app-boot-chrome--custom {
        display: flex;
      }

      html[data-synergy-desktop-chrome="native"] .synergy-app-boot-chrome--native {
        display: flex;
      }

      .synergy-app-boot-chrome--custom {
        align-items: center;
        flex: 0 0 36px;
        height: 36px;
        min-height: 36px;
        border-bottom: 1px solid #deded8;
        background: #f7f7f5;
      }

      .synergy-app-boot-brand {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 168px;
        height: 100%;
        padding: 0 12px;
        color: #1c1d20;
        font-size: 12px;
        font-weight: 500;
        -webkit-app-region: no-drag;
      }

      .synergy-app-boot-icon {
        width: 20px;
        height: 20px;
        flex: 0 0 auto;
        border-radius: 5px;
      }

      .synergy-app-boot-drag {
        flex: 1;
        align-self: stretch;
        min-width: 0;
      }

      .synergy-app-boot-controls {
        display: flex;
        align-items: stretch;
        height: 100%;
        margin-left: auto;
        -webkit-app-region: no-drag;
      }

      .synergy-app-boot-control {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 46px;
        height: 100%;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: #858992;
        font: inherit;
        transition:
          background-color 140ms cubic-bezier(0.16, 1, 0.3, 1),
          color 140ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      .synergy-app-boot-control:hover,
      .synergy-app-boot-control:focus-visible {
        background: #ededeb;
        color: #1c1d20;
        outline: none;
      }

      .synergy-app-boot-control:focus-visible {
        box-shadow: inset 0 0 0 2px rgba(28, 29, 32, 0.18);
      }

      .synergy-app-boot-control--close:hover,
      .synergy-app-boot-control--close:focus-visible {
        background: #c7392f;
        color: #ffffff;
      }

      .synergy-app-boot-glyph {
        position: relative;
        display: block;
        width: 12px;
        height: 12px;
      }

      .synergy-app-boot-glyph--minimize::before {
        position: absolute;
        right: 1px;
        bottom: 2px;
        left: 1px;
        height: 1px;
        background: currentColor;
        content: "";
      }

      .synergy-app-boot-glyph--maximize::before {
        position: absolute;
        inset: 1px;
        border: 1px solid currentColor;
        content: "";
      }

      .synergy-app-boot-glyph--close::before,
      .synergy-app-boot-glyph--close::after {
        position: absolute;
        top: 5px;
        left: 1px;
        width: 10px;
        height: 1px;
        background: currentColor;
        content: "";
      }

      .synergy-app-boot-glyph--close::before {
        transform: rotate(45deg);
      }

      .synergy-app-boot-glyph--close::after {
        transform: rotate(-45deg);
      }

      .synergy-app-boot-chrome--native {
        flex: 0 0 18px;
        height: 18px;
        min-height: 18px;
      }

      .synergy-app-boot-traffic-space {
        flex: 0 0 90px;
        height: 100%;
      }

      .synergy-app-boot-main {
        display: grid;
        flex: 1;
        place-items: center;
        min-height: 0;
        padding: 48px 32px 64px;
      }

      .synergy-app-boot-panel {
        width: min(420px, calc(100vw - 48px));
      }

      .synergy-app-boot-wordmark {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 28px;
        color: #5f636b;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0;
      }

      .synergy-app-boot-rule {
        flex: 1;
        height: 1px;
        background: #deded8;
      }

      .synergy-app-boot-title {
        margin: 0 0 10px;
        color: #1c1d20;
        font-size: 24px;
        font-weight: 650;
        letter-spacing: 0;
        line-height: 1.2;
      }

      .synergy-app-boot-detail {
        margin: 0;
        color: #5f636b;
        font-size: 13px;
        line-height: 1.55;
      }

      .synergy-app-boot-progress {
        position: relative;
        height: 2px;
        margin-top: 28px;
        overflow: hidden;
        background: #ededeb;
      }

      .synergy-app-boot-progress::before {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        width: 36%;
        background: #303238;
        content: "";
        animation: synergy-app-boot-progress 1200ms cubic-bezier(0.65, 0, 0.35, 1) infinite;
      }

      .synergy-app-boot-step {
        margin-top: 14px;
        color: #858992;
        font-size: 12px;
        line-height: 1.45;
      }

      @keyframes synergy-app-boot-progress {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(280%);
        }
      }

      @media (prefers-color-scheme: dark) {
        html,
        body {
          background: #111214;
        }

        #synergy-app-boot {
          background: #111214;
          color: #f5f6f7;
        }

        .synergy-app-boot-chrome--custom {
          border-bottom-color: #2c3038;
          background: #111214;
        }

        .synergy-app-boot-brand,
        .synergy-app-boot-title {
          color: #f5f6f7;
        }

        .synergy-app-boot-control {
          color: #818895;
        }

        .synergy-app-boot-control:hover,
        .synergy-app-boot-control:focus-visible {
          background: #242832;
          color: #f5f6f7;
        }

        .synergy-app-boot-control:focus-visible {
          box-shadow: inset 0 0 0 2px rgba(245, 246, 247, 0.18);
        }

        .synergy-app-boot-wordmark,
        .synergy-app-boot-detail {
          color: #b8bdc7;
        }

        .synergy-app-boot-rule {
          background: #2c3038;
        }

        .synergy-app-boot-progress {
          background: #242832;
        }

        .synergy-app-boot-progress::before {
          background: #d7dbe3;
        }

        .synergy-app-boot-step {
          color: #818895;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .synergy-app-boot-progress::before {
          width: 42%;
          animation: none;
        }
      }

      @media (max-width: 720px) {
        .synergy-app-boot-brand {
          min-width: 72px;
        }

        .synergy-app-boot-brand span {
          display: none;
        }

        .synergy-app-boot-main {
          padding: 40px 24px 56px;
        }
      }
    </style>
  </head>
  <body class="antialiased overscroll-none text-12-regular overflow-hidden">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="synergy-app-boot" aria-live="polite" aria-busy="true">
      <header class="synergy-app-boot-chrome synergy-app-boot-chrome--custom">
        <div class="synergy-app-boot-brand">
          <img class="synergy-app-boot-icon" data-synergy-app-boot-icon alt="" draggable="false" />
          <span>Synergy</span>
        </div>
        <div class="synergy-app-boot-drag"></div>
        <div class="synergy-app-boot-controls">
          <button
            type="button"
            class="synergy-app-boot-control"
            data-synergy-app-boot-window-action="minimize"
            aria-label="Minimize"
            title="Minimize"
          >
            <span class="synergy-app-boot-glyph synergy-app-boot-glyph--minimize"></span>
          </button>
          <button
            type="button"
            class="synergy-app-boot-control"
            data-synergy-app-boot-window-action="maximize"
            aria-label="Maximize"
            title="Maximize"
          >
            <span class="synergy-app-boot-glyph synergy-app-boot-glyph--maximize"></span>
          </button>
          <button
            type="button"
            class="synergy-app-boot-control synergy-app-boot-control--close"
            data-synergy-app-boot-window-action="close"
            aria-label="Close"
            title="Close"
          >
            <span class="synergy-app-boot-glyph synergy-app-boot-glyph--close"></span>
          </button>
        </div>
      </header>
      <header class="synergy-app-boot-chrome synergy-app-boot-chrome--native">
        <div class="synergy-app-boot-traffic-space"></div>
        <div class="synergy-app-boot-drag"></div>
      </header>
      <main class="synergy-app-boot-main">
        <section class="synergy-app-boot-panel">
          <div class="synergy-app-boot-wordmark">
            <span>Synergy</span>
            <span class="synergy-app-boot-rule"></span>
          </div>
          <h1 class="synergy-app-boot-title">Loading workspace</h1>
          <p class="synergy-app-boot-detail">Preparing the workbench.</p>
          <div class="synergy-app-boot-progress" role="progressbar" aria-label="Loading Synergy"></div>
          <div class="synergy-app-boot-step">Loading app surface</div>
        </section>
      </main>
    </div>
    <div id="root" class="flex flex-col h-dvh"></div>
    <script id="synergy-app-boot-script">
      ;(function () {
        var desktopWindow = window.synergyDesktop && window.synergyDesktop.window
        var chrome = desktopWindow && desktopWindow.chrome
        if (chrome === "custom" || chrome === "native") {
          document.documentElement.setAttribute("data-synergy-desktop-chrome", chrome)
        }

        var icon = document.querySelector("[data-synergy-app-boot-icon]")
        if (icon) {
          var prefix = window.__SYNERGY_ASSET_PREFIX__ || ""
          icon.setAttribute("src", prefix + "/favicon-96x96.png")
        }

        function bindAction(action, method) {
          var button = document.querySelector('[data-synergy-app-boot-window-action="' + action + '"]')
          if (!button) return
          button.addEventListener("click", function () {
            if (desktopWindow && desktopWindow[method]) desktopWindow[method]()
          })
        }

        bindAction("minimize", "minimize")
        bindAction("maximize", "toggleMaximize")
        bindAction("close", "close")

        var maximize = document.querySelector('[data-synergy-app-boot-window-action="maximize"]')
        function updateMaximizeLabel(state) {
          if (!maximize) return
          var label = state && (state.maximized || state.fullscreen) ? "Restore" : "Maximize"
          maximize.setAttribute("aria-label", label)
          maximize.setAttribute("title", label)
        }

        if (desktopWindow && desktopWindow.state) {
          desktopWindow
            .state()
            .then(updateMaximizeLabel)
            .catch(function () {})
        }
        if (desktopWindow && desktopWindow.onEvent) {
          desktopWindow.onEvent(function (event) {
            if (event && event.type === "state") updateMaximizeLabel(event.state)
          })
        }
      })()
    </script>
    <script src="/src/entry.tsx" type="module"></script>
  </body>
</html>
