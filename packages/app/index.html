            prefix = fullPath.slice(0, fullPath.length - route.length).replace(/\/+$/, "")

        }
        function asset(path) {
          return prefix + path

        function attr(value) {
          return String(value).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;")

        function write(tag, attrs) {

          if (!maximize) return
          var label = state && (state.maximized || state.fullscreen) ? "Restore" : "Maximize"
          maximize.setAttribute("aria-label", label)
          maximize.setAttribute("title", label)
        }

        if (desktopWindow && desktopWindow.state) {
          desktopWindow
            .state()
            .then(updateMaximizeLabel)
            .catch(function () {})
        }
        if (desktopWindow && desktopWindow.onEvent) {
          desktopWindow.onEvent(function (event) {
            if (event && event.type === "state") updateMaximizeLabel(event.state)
          })
        }
      })()
    </script>
    <script src="/src/entry.tsx" type="module"></script>
  </body>
</html>
