<!doctype html>
<html lang="en" style="background-color: var(--background-base); overflow: hidden">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Synergy</title>
    <script id="synergy-head-assets-script">
      ;(function () {
        var route = window.__SYNERGY_ROUTE__
        var prefix = ""
        if (route != null) {
          var fullPath = window.location.pathname
          if (fullPath !== route && fullPath.endsWith(route)) {
            prefix = fullPath.slice(0, fullPath.length - route.length).replace(/\/+$/, "")
          }
        }
        function asset(path) {
          return prefix + path
        }
        function attr(value) {
          return String(value).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;")
        }
        function write(tag, attrs) {
          var html = "<" + tag
          for (var name in attrs) html += " " + name + '="' + attr(attrs[name]) + '"'
          document.write(html + ">")
        }
        write("link", { rel: "icon", type: "image/png", href: asset("/favicon-96x96.png"), sizes: "96x96" })
        write("link", { rel: "icon", type: "image/svg+xml", href: asset("/favicon.svg") })
        write("link", { rel: "shortcut icon", href: asset("/favicon.ico") })
        write("link", { rel: "apple-touch-icon", sizes: "180x180", href: asset("/apple-touch-icon.png") })
        write("link", { rel: "manifest", href: asset("/site.webmanifest") })
        write("meta", { property: "og:image", content: asset("/social-share.png") })
        write("meta", { property: "twitter:image", content: asset("/social-share.png") })
      })()
    </script>
    <meta name="theme-color" content="#F8F7F7" />
    <meta name="theme-color" content="#131010" media="(prefers-color-scheme: dark)" />
    <script id="synergy-theme-preload-script">
      ;(function () {
        var scheme = localStorage.getItem("synergy-color-scheme") || "system"
        var isDark = scheme === "dark" || (scheme === "system" && matchMedia("(prefers-color-scheme: dark)").matches)
        var mode = isDark ? "dark" : "light"
        document.documentElement.style.setProperty("color-scheme", mode)
      })()
    </script>
  </head>
  <body class="antialiased overscroll-none text-12-regular overflow-hidden">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root" class="flex flex-col h-dvh"></div>
    <script src="/src/entry.tsx" type="module"></script>
  </body>
</html>
